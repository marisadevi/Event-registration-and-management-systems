<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f3e5f5; height:100vh; display:flex; justify-content:center; align-items:center;">

<div class="card p-4 shadow text-center" style="width:400px; border-radius:15px;">

    <h3>Hi {{ username }}</h3>
    <p>Select your Event</p>

    <form method="POST">
        <select name="event" class="form-select mb-3" required>
            <option value="">-- Select Event --</option>
            <option value="Marriage">Marriage</option>
            <option value="Birthday">Birthday</option>
            <option value="College Fest">College Fest</option>
            <option value="House Warming">House Warming</option>
            <option value="Cradle Ceremony">Cradle Ceremony</option>
            <option value="Engagement">Engagement</option>
        </select>

        <button class="btn btn-success w-100">Next</button>
    </form>

</div>

</body>
</html>
