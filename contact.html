<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#ede7f6; height:100vh; display:flex; justify-content:center; align-items:center;">

<div class="card p-4 shadow text-center" style="width:350px; border-radius:15px;">

    <h3>Contact Details</h3>

    <form method="POST">
        <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required>
        <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

        <button class="btn btn-success w-100">Submit</button>
    </form>

</div>

</body>
</html>
